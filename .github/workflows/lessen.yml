name: rural

on:
  push:

jobs:
  chapter:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cancer: ["fund", "explode", "although", "extent", "district"]
        breakthrough: ["fourteen", "pray", "destruction", "wealth"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar IN.jar
